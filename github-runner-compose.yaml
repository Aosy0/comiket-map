services:
  github-runner:
    image: myoung34/github-runner:latest
    container_name: github-runner-comiketmap
    environment:
      # GitHubリポジトリURL
      - REPO_URL=https://github.com/Aosy0/comiket-map

      # Runner名
      - RUNNER_NAME=comiketmap-docker-runner

      # GitHubのPersonal Access Token（Settings → Developer settings → Personal access tokens）
      # 必要なスコープ: repo (Full control of private repositories)
      - ACCESS_TOKEN=${GITHUB_TOKEN}

      # ワークディレクトリ
      - RUNNER_WORKDIR=/tmp/github-runner

      # ラベル（カスタマイズ可能）
      - LABELS=docker,self-hosted,linux,comiketmap,dind

      # Runner グループ（デフォルト: Default）
      - RUNNER_GROUP=Default

      # Docker-in-Dockerを有効化
      - DOCKER_ENABLED=true

      # エフェメラルモード（ジョブ実行後に自動的に登録解除）
      - EPHEMERAL=true

    privileged: true  # Docker-in-Dockerに必要

    volumes:
      # Dockerコマンドを実行できるようにする
      - /var/run/docker.sock:/var/run/docker.sock

      # プロジェクトディレクトリをマウント
      - /home/aosy/Docker/comiketmap:/home/aosy/Docker/comiketmap

    restart: unless-stopped
