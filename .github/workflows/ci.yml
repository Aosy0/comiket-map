name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Biome
        continue-on-error: true
        run: npx biome check .

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Update code from Git
        run: |
          cd /home/aosy/Docker/comiketmap
          git config --global --add safe.directory /home/aosy/Docker/comiketmap
          git fetch origin main
          git reset --hard origin/main

      - name: Check compose file
        run: |
          cd /home/aosy/Docker/comiketmap
          if [ ! -f compose.yaml ]; then
            echo "⚠️ compose.yaml not found!"
            exit 1
          else
            echo "✅ compose.yaml exists"
          fi

      - name: Rebuild containers
        run: |
          cd /home/aosy/Docker/comiketmap
          docker compose down
          docker compose up -d

      - name: Show status
        run: |
          echo "✅ Deployment completed at $(date)"
          cd /home/aosy/Docker/comiketmap
          docker compose ps
